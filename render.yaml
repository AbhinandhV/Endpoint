services:
  - type: web
    name: endpoint-api
    runtime: docker
    rootDir: Endpoint
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ApiKey
        generateValue: true
      - key: AllowedOrigins__0
        sync: false  # Set this to your Netlify frontend URL
    healthCheckPath: /api/health/ping
    autoDeploy: true
